train:
  batch_size: 32
  num_epochs: 200
  learning_rate: 0.00002
  weight_decay: 0.01
  early_stopping: True
  early_stopping_patience: 20
  cross_validation: True
  cross_validation_folds: 5

model:
  pooling: 'mean' # 'mean', 'cls'
  n_layers: 1
  dropout: 0.3
  hidden_size: 768
  intermediate_size: 3072
  n_heads: 12
  num_classes: 1
  hidden_mlp_size: 256
  textual_model: 'distil'
  audio_model: 'egemaps'
  pauses: False
  fusion: 'cross'

data:
  train_dir: "/home/usuaris/veussd/roger.esteve.sanchez/adresso/processed_data/diagnosis/train"
  root_text_path: "/home/usuaris/veussd/roger.esteve.sanchez/adresso/processed_data/diagnosis/train/text/"
  root_audio_path: "/home/usuaris/veussd/roger.esteve.sanchez/adresso/processed_data/diagnosis/train/audio/"
  csv_labels_path: "/home/usuaris/veussd/roger.esteve.sanchez/adresso/processed_data/diagnosis/train/adresso-train-mmse-scores.csv"
  splits_path: "/home/usuaris/veussd/roger.esteve.sanchez/adresso/processed_data/diagnosis/train/splits/"

wandb:
  project: "CogniAligned"
  entity: ""  # Optional W&B entity/team name
