train:
  batch_size: 4
  num_epochs: 200
  learning_rate: 0.00002
  weight_decay: 0.1
  early_stopping: True
  early_stopping_patience: 15
  cross_validation: True
  cross_validation_folds: 5

model:
  pooling: 'mean' # 'mean', 'cls'
  n_layers: 1
  dropout: 0.3
  hidden_size: 768
  intermediate_size: 3072
  n_heads: 12
  num_classes: 1
  hidden_mlp_size: 256
  textual_model: 'distil'
  audio_model: 'wav2vec2'
  pauses: True
  fusion: 'mambaconcat'

